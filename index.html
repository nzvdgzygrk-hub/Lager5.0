<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Lager 5.0</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;max-width:1100px;margin:auto;padding:16px;background:#fff;color:#111}
h1{font-size:36px;margin:18px 0 8px}
p{font-size:18px}
.card{border:1px solid #ccc;padding:12px;border-radius:14px;margin:12px 0;background:#fff}
.hidden{display:none}
.top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0}
#search{flex:1 1 180px;min-width:0}
input,textarea,button{font-size:16px;border-radius:10px;border:1px solid #ddd;padding:10px}
button{background:#eee;border:0;cursor:pointer}
.anteilBox{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:12px 0;padding:12px;border:1px solid #ddd;border-radius:14px}
.anteilBox label{font-weight:bold;font-size:18px}
#meinAnteil{width:120px}
#meinAnteilAnzeige,#ausgleichAnzeige{font-weight:bold;font-size:18px;white-space:nowrap}
#stats{margin:14px 0;font-size:16px;line-height:1.5}
.preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.preview img,.card img{width:90px;height:90px;object-fit:cover;border-radius:8px;margin:3px}
.card h3{font-size:22px;margin:10px 0 6px}
.card button{margin:4px 4px 0 0}
#importFile{max-width:210px}
@media(max-width:600px){
 body{padding:14px}
 h1{font-size:34px}
 .top{display:grid;grid-template-columns:1fr 1fr;gap:8px}
 #search{grid-column:1/3;width:100%}
 #importFile{grid-column:1/3;width:100%;max-width:none}
 .anteilBox{display:grid;grid-template-columns:auto 1fr;gap:8px}
 .anteilBox label{grid-column:1/3}
 #meinAnteil{width:100%}
 #saveAnteil{width:100%}
 #meinAnteilAnzeige{align-self:center}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<h1>📦 Lager 5.0</h1>
<p>Programmiert von F.Kaplan</p>

<div class="top">
    <input id="search" placeholder="🔍 Suchen...">
    <button onclick="toggleForm()">➕ Artikel</button>
    <button onclick="exportJson()">📤 Backup</button>
    <input type="file" id="importFile" accept="application/json">
</div>

<div class="anteilBox">
    <label for="meinAnteil">👤 Mein Anteil:</label>
    <input id="meinAnteil" type="text" inputmode="decimal" placeholder="z.B. 40">
    <button id="saveAnteil">💾 Speichern</button>
    <span id="meinAnteilAnzeige">0 €</span>
</div>

<div id="ausgleichAnzeige">⚖️ Ausgeglichen</div>
<div id="stats"></div>

<div id="form" class="card hidden">
    <input id="title" placeholder="Titel" style="width:100%"><br><br>
    <input id="location" placeholder="Lagerort" style="width:100%"><br><br>
    <input id="price" type="number" placeholder="Preis" style="width:100%"><br><br>
    <label><input id="favorite" type="checkbox"> ⭐ Favorit</label><br><br>
    <textarea id="note" rows="4" style="width:100%;" placeholder="Notiz"></textarea><br><br>
    <button onclick="document.getElementById('photos').click()">📷 Fotos hinzufügen</button>
    <input id="photos" type="file" accept="image/*" multiple style="display:none">
    <div id="preview" class="preview"></div><br>
    <button onclick="saveItem()">💾 Speichern</button>
</div>

<h2>Aktive Artikel</h2>
<div id="items"></div>

<h2>Verkauft</h2>
<div id="sold"></div>

<script src="script.js"></script>
</body>
</html>
